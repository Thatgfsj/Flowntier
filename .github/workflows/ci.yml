# ──────────────────────────────────────────────────────────────────
# ci.yml — validation on every PR and main push
#
# Runs five independent jobs:
#   1. lint-branding  — fails if old ACO / Agent Company OS brand
#                       leaks back into active code or docs
#   2. rust-tests     — cargo test --workspace + clippy + fmt
#   3. typecheck      — pnpm install + tsc --noEmit + eslint + prettier
#   4. e2e-windows    — builds the runtime sidecar on Windows and
#                       runs .validation/e2e_tauri_commands.ps1
#                       against it (named pipes are Windows-only)
#   5. summary        — required status check that passes when the
#                       four above all pass
#
# Concurrency cancels in-progress PR runs on the same branch when a
# new push arrives, so reviewers don't get spammed with old runs.
#
# Removed in v0.4:
#   - python job (uv / pytest / ruff / black / mypy) — Python runtime
#     was deleted in v0.3 (commit 9527436, see history/docs/V03_DELETIONS.md).
#   - markdown prettier job — folded into the typecheck job; a single
#     pnpm -r format:check covers .md files.
# ──────────────────────────────────────────────────────────────────

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:

  # ──────────────────────────────────────────────────────────────
  # 1. lint-branding — fails if Phase 0 scrub regresses.
  # ──────────────────────────────────────────────────────────────
  lint-branding:
    name: branding lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for old brand strings
        # Phase 0's exit criterion. Patterns match everything we
        # explicitly scrubbed; the same set lives in the Makefile's
        # lint-branding target so local `make lint-branding` matches
        # CI exactly. Allowed exceptions:
        #   - history/                       (intentional archive)
        #   - tools/replace_in_files.py      (script itself)
        #   - Makefile                        (grep pattern lives there)
        #   - CHANGELOG.md                    (historical mention)
        #   - docs/DEPRECATIONS.md            (deprecation table)
        #   - .github/workflows/release.yml   (will rewrite in follow-up)
        run: |
          set -euo pipefail
          HITS=$(grep -rInE 'Agent Company OS|AgentCompanyOS|aco_runtime|@aco/|aco-runtime\.rs|aco\.toml' \
              --exclude-dir=history \
              --exclude-dir=target \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude-dir=.git \
              --exclude=pnpm-lock.yaml \
              --exclude=Cargo.lock \
              --exclude=tools/replace_in_files.py \
              --exclude=Makefile \
              --exclude=CHANGELOG.md \
              --exclude=docs/DEPRECATIONS.md \
              --exclude=.github/workflows/release.yml \
              . || true)
          if [ -n "$HITS" ]; then
            echo "::error::Brand regression: old ACO / Agent Company OS strings found"
            echo "$HITS"
            exit 1
          fi
          echo "✓ no brand regressions"

  # ──────────────────────────────────────────────────────────────
  # 2. rust-tests — compile + test + lint for the workspace.
  # ──────────────────────────────────────────────────────────────
  rust-tests:
    name: cargo test + clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'crates/ -> target'
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        # The cancel_kills_long_running_bash test in agent-core is a
        # known Windows-only flake (relies on `taskkill /T` killing a
        # 'ping -n 30' tree within 5s — fails on this Linux runner
        # because the test only spawns a non-existent process on
        # Linux). We skip it here; it runs on the Windows e2e runner
        # below where it has a chance to pass.
        run: |
          cargo test --workspace --all-features \
            -- --skip tool::bash::cap_tests::cancel_kills_long_running_bash

  # ──────────────────────────────────────────────────────────────
  # 3. typecheck — pnpm install + tsc + eslint + prettier.
  # ──────────────────────────────────────────────────────────────
  typecheck:
    name: pnpm typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm + Node
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: tsc --noEmit
        run: pnpm -r --parallel exec tsc --noEmit

      - name: eslint
        run: pnpm -r --parallel lint

      - name: prettier --check
        run: pnpm -r --parallel format:check

  # ──────────────────────────────────────────────────────────────
  # 4. e2e-windows — exercise the JSON-RPC pipe end-to-end.
  #    Runs only on Windows because the pipe IPC is a Windows
  #    named pipe; Unix domain socket path tested locally.
  # ──────────────────────────────────────────────────────────────
  e2e-windows:
    name: e2e (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'crates/ -> target'
          cache-on-failure: true

      - name: Build runtime sidecar
        run: |
          cargo build --release -p pipe-server --bin flowntier-runtime
          mkdir -p apps/desktop/src-tauri/binaries
          cp target/release/flowntier-runtime.exe `
             apps/desktop/src-tauri/binaries/flowntier-runtime-x86_64-pc-windows-msvc.exe

      - name: Run end-to-end test
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File .validation/e2e_tauri_commands.ps1

  # ──────────────────────────────────────────────────────────────
  # 5. summary — the check that branches protect on.
  # ──────────────────────────────────────────────────────────────
  summary:
    name: summary
    needs: [lint-branding, rust-tests, typecheck, e2e-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        if: needs.lint-branding.result == 'success' && needs.rust-tests.result == 'success' && needs.typecheck.result == 'success' && needs.e2e-windows.result == 'success'
        run: echo "All CI checks green."

      - name: CI failed
        if: needs.lint-branding.result != 'success' || needs.rust-tests.result != 'success' || needs.typecheck.result != 'success' || needs.e2e-windows.result != 'success'
        run: |
          echo "::error::CI failed:"
          echo "  branding : ${{ needs.lint-branding.result }}"
          echo "  rust     : ${{ needs.rust-tests.result }}"
          echo "  ts       : ${{ needs.typecheck.result }}"
          echo "  e2e      : ${{ needs.e2e-windows.result }}"
          exit 1