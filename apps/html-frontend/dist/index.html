<title>Flowntier</title>
<!--
  Browser-host for the **same** desktop bundle (apps/desktop/dist).
  This file injects a `__TAURI_INTERNALS__` shim BEFORE the
  bundle loads. The shim translates every Tauri 2.x IPC call
  (`invoke`, `transformCallback`, `unregisterCallback`) into a
  POST /rpc + Server-Sent Events roundtrip against the
  pipe-server's HTTP bridge on 127.0.0.1:8765. As a result the
  entire React/Settings/ChatZone/WorkdirSetup UI from the
  Tauri shell renders unchanged inside any browser.

  The chairman's single requirement is "跟应用端一模一样的前端
  Flowntier" — this file is the answer. No framework, no
  bundler, no separate code path: it's the desktop bundle
  wrapped in a 30-line IPC shim.
-->
